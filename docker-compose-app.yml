version: '3.5'

services:
  weather-agent:
    build: .
    container_name: weather-agent
    ports:
      - "8000:8000"   # FastAPI HTTP API
      - "9000:9000"   # MCP SSE Server
    env_file:
      - .env.example
    environment:
      - DB_HOST=host.docker.internal
      - DB_PORT=3307
    volumes:
      - ./models:/app/models
      - ./milvus_weather.db:/app/milvus_weather.db
      - ./.env.example:/app/.env.example
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
